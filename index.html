<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER HUD v6.0 - MATRIX PERIMETER</title>
    <style>
        :root { 
            --primary-color: #00f2ff; 
            --bg-color: #01080e;      
            --box-bg: rgba(2, 12, 22, 0.95); 
            --text-color: #c4faff;
            --error-color: #ff3c3c; 
            --success-color: #3cff8c; 
            --font-family: 'Segoe UI', 'Courier New', monospace; 
            --ease-snap: cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-family); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .box { 
            background: var(--box-bg); 
            padding: 30px;
            border-radius: 8px; 
            position: relative;
            text-align: center; 
            width: 100%; max-width: 450px; display: none; 
            opacity: 0; transform: translate3d(0, 20px, 0);
            backdrop-filter: blur(10px);
            transition: opacity 0.4s var(--ease-snap), transform 0.4s var(--ease-snap);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .box::before {
            content: "";
            position: absolute;
            inset: -2px; 
            border-radius: 10px;
            padding: 2px; 
            background: conic-gradient(from var(--angle), transparent 70%, var(--primary-color) 100%);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
            animation: rotateAngle 3s linear infinite;
        }

        @property --angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotateAngle {
            to { --angle: 360deg; }
        }

        .box.active { display: block; opacity: 1; transform: translate3d(0, 0, 0); }
        #adminScreen { max-width: 900px; max-height: 92vh; overflow-y: auto; }

        h2 { 
            margin: 0 0 25px 0; text-transform: uppercase; letter-spacing: 5px; 
            font-size: 1.3em; color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 10px;
        }

        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(0, 242, 255, 0.2); color: #fff; 
            font-family: var(--font-family); text-align: center; outline: none; 
            box-sizing: border-box; font-size: 16px; border-radius: 4px;
        }
        input:focus { border-color: var(--primary-color); background: rgba(0, 242, 255, 0.05); }

        button { 
            width: 100%; padding: 14px; margin-top: 15px; 
            background: rgba(0, 242, 255, 0.1); color: var(--primary-color); 
            border: 1px solid var(--primary-color); font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        button:hover { background: var(--primary-color); color: #000; box-shadow: 0 0 20px var(--primary-color); }

        .profile-container { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        @media (min-width: 768px) { .profile-container { grid-template-columns: 1fr 1fr 1fr; } }

        .code-section { 
            border: 1px solid rgba(0, 242, 255, 0.1); padding: 15px; border-radius: 4px; 
            background: rgba(0, 15, 25, 0.4); text-align: left;
        }
        .code-section h4 { 
            margin: 0 0 12px 0; font-size: 0.75em; color: var(--primary-color); 
            letter-spacing: 2px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); padding-bottom: 5px;
        }
        .code-list { font-size: 0.85em; height: 250px; overflow-y: auto; color: #85e4ff; }
        .code-item { padding: 6px 0; border-bottom: 1px solid rgba(0, 242, 255, 0.05); }

        .maintenance-top { 
            background: rgba(255, 60, 60, 0.05); padding: 10px; margin-bottom: 20px; 
            border-radius: 2px; font-size: 0.75em; border: 1px solid rgba(255, 60, 60, 0.3);
        }
        .clear-options { display: none; gap: 8px; margin-top: 10px; }
        .clear-options.active { display: flex; flex-wrap: wrap; }
        .btn-clear-mini { background: rgba(255, 60, 60, 0.1); color: #ff3c3c; border: 1px solid #ff3c3c; padding: 6px; flex: 1; cursor: pointer; min-width: 120px; }

        .status-msg { margin-top: 15px; font-size: 0.85em; font-weight: bold; min-height: 20px; }
        .live-indicator { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="loginScreen" class="box active">
        <h2>XÁC THỰC DANH TÍNH</h2>
        <input type="text" id="userLogin" placeholder="TÀI KHOẢN" autocomplete="off" autofocus>
        <input type="password" id="passLogin" placeholder="MẬT MÃ TRUY CẬP">
        <button id="btnLogin" onclick="handleLogin()">KHỞI TẠO SESSION</button>
        <p onclick="showScreen('registerScreen')" style="cursor:pointer; font-size:0.7em; margin-top:20px; opacity:0.6; text-decoration: underline;">TẠO TÀI KHOẢN MỚI</p>
        <p id="loginStatus" class="status-msg"></p>
    </div>

    <div id="registerScreen" class="box">
        <h2>GHI DANH HỆ THỐNG</h2>
        <input type="text" id="userReg" placeholder="TÀI KHOẢN MỚI">
        <input type="password" id="passReg" placeholder="MẬT MÃ MỚI">
        <button id="btnReg" onclick="handleRegister()">XÁC NHẬN ĐĂNG KÝ</button>
        <p onclick="showScreen('loginScreen')" style="cursor:pointer; font-size:0.7em; margin-top:20px; opacity:0.6; text-decoration: underline;">QUAY LẠI ĐĂNG NHẬP</p>
        <p id="regStatus" class="status-msg"></p>
    </div>

    <div id="adminScreen" class="box">
        <div class="maintenance-top">
            <div style="color: #ff3c3c; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between;" onclick="toggleClearMenu()">
                <span>[!] KHU VỰC BẢO TRÌ HỆ THỐNG</span><span>▼</span>
            </div>
            <div id="clearMenu" class="clear-options">
                <button class="btn-clear-mini" onclick="confirmClear('all')">XÓA TOÀN BỘ</button>
                <button class="btn-clear-mini" onclick="confirmClear('used')">XÓA ĐÃ SỬ DỤNG</button>
                <button class="btn-clear-mini" onclick="confirmClear('created')">XÓA ĐÃ TẠO</button>
            </div>
        </div>

        <h2>BẢNG ĐIỀU KHIỂN</h2>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(0,242,255,0.1); padding-bottom: 10px;">
            <p style="margin:0"><span class="live-indicator"></span>USER: <span id="userNameDisp" style="color: var(--primary-color)"></span></p>
            <button onclick="location.reload()" style="width:auto; padding:5px 12px; background:rgba(255,60,60,0.1); color:#ff3c3c; font-size:0.7em; border: 1px solid #ff3c3c; margin:0; clip-path:none;">THOÁT</button>
        </div>

        <div style="background: rgba(0, 242, 255, 0.02); padding: 15px; border: 1px solid rgba(0, 242, 255, 0.1);">
            <div style="display:flex; gap:10px;">
                <input type="text" id="vipCode" style="margin:0" placeholder="NHẬP MÃ VIP..." autocomplete="off">
                <button id="btnAddCode" style="margin:0; width:40%;" onclick="handleAddCode()">KÍCH HOẠT</button>
            </div>
        </div>

        <div class="profile-container">
            <div class="code-section"><h4>[ĐÃ TẠO]</h4><div id="listCreated" class="code-list"></div></div>
            <div class="code-section"><h4>[SẴN SÀNG]</h4><div id="listUnused" class="code-list"></div></div>
            <div class="code-section"><h4>[ĐÃ DÙNG]</h4><div id="listUsed" class="code-list"></div></div>
        </div>
        <p id="adminStatus" class="status-msg"></p>
    </div>

    <script>
        // --- 1. HIỆU ỨNG MATRIX CANVAS ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "01010101ABCDEF0123456789";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(1, 8, 14, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 2. LOGIC CHÍNH ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkVVTdCvxhVut8xL4NUaK4AtbDEhbq_mFAaTLpIUvlhJPrh5-sqCS4ab-xiMZ_mMiCZQ/exec";
        let currentLoggedUser = "";
        let localData = { created: [], used: [], unused: [] };

        // Xử lý phím Enter cho toàn bộ trang
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const activeBox = document.querySelector('.box.active');
                if (!activeBox) return;
                const btn = activeBox.querySelector('button:not(.sync-btn):not(.btn-clear-mini)');
                if (btn) btn.click();
            }
        });

        setInterval(() => {
            if (!document.hidden && document.getElementById('adminScreen').classList.contains('active')) {
                refreshUserData(false); 
            }
        }, 3000);

        function showScreen(screenId) {
            document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(screenId);
            target.classList.add('active');
            // Tự động focus vào input đầu tiên của màn hình mới
            const input = target.querySelector('input');
            if (input) input.focus();
        }

        function renderAllLists() {
            const render = (id, list) => {
                const el = document.getElementById(id);
                el.innerHTML = list.length ? list.map(c => `<div class="code-item">> ${c}</div>`).reverse().join('') : '<div style="opacity:0.2; padding:10px;">EMPTY</div>';
            };
            render('listCreated', localData.created); render('listUsed', localData.used); render('listUnused', localData.unused);
        }

        async function refreshUserData() {
            if (!currentLoggedUser) return;
            try {
                // Sử dụng fetch ngầm để không chặn luồng xử lý
                const res = await fetch(`${SCRIPT_URL}?action=getUserData&username=${currentLoggedUser}`);
                const newData = await res.json();
                if (JSON.stringify(localData) !== JSON.stringify(newData)) {
                    localData = newData; renderAllLists();
                }
            } catch (e) { console.error("Sync Error"); }
        }

        async function handleLogin() {
            const u = document.getElementById('userLogin').value.trim();
            const p = document.getElementById('passLogin').value.trim();
            const status = document.getElementById('loginStatus');
            const btn = document.getElementById('btnLogin');
            if(!u || !p) return;
            
            btn.disabled = true; 
            status.textContent = "AUTHENTICATING...";

            try {
                // Tối ưu hóa login bằng cách gọi fetch ngay lập tức
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", username: u, password: p }),
                    headers: { "Content-Type": "text/plain" }
                });
                const res = await response.text();

                if(res === "success") {
                    currentLoggedUser = u;
                    document.getElementById('userNameDisp').textContent = u.toUpperCase();
                    showScreen('adminScreen');
                    refreshUserData(); // Chạy đồng bộ dữ liệu ngay sau khi login thành công
                } else {
                    status.className = "status-msg error"; 
                    status.textContent = "SAI THÔNG TIN"; 
                    btn.disabled = false;
                }
            } catch(e) { 
                status.textContent = "LỖI KẾT NỐI"; 
                btn.disabled = false; 
            }
        }

        async function handleAddCode() {
            const input = document.getElementById('vipCode');
            const code = input.value.trim().toUpperCase();
            if(!code) return;
            
            // Optimistic UI: Cập nhật giao diện ngay lập tức
            localData.created.push(code); 
            localData.unused.push(code); 
            renderAllLists();
            input.value = "";
            input.focus(); // Giữ tiêu điểm ở ô nhập mã

            // Gửi dữ liệu chạy ngầm
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "add", code: code, username: currentLoggedUser }),
                headers: { "Content-Type": "text/plain" }
            });
        }

        async function handleRegister() {
            const u = document.getElementById('userReg').value.trim();
            const p = document.getElementById('passReg').value.trim();
            if(!u || !p) return;
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "register", username: u, password: p }),
                    headers: { "Content-Type": "text/plain" }
                }).then(r => r.text());
                if(res === "success") { 
                    alert("GHI DANH THÀNH CÔNG!"); 
                    showScreen('loginScreen'); 
                } else { 
                    alert("TÀI KHOẢN ĐÃ TỒN TẠI"); 
                }
            } catch(e) {}
        }

        function toggleClearMenu() { document.getElementById('clearMenu').classList.toggle('active'); }
        async function confirmClear(type) {
            if (!confirm("XÁC NHẬN PHÁ HỦY DỮ LIỆU?")) return;
            toggleClearMenu();
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "clearData", type: type, username: currentLoggedUser }),
                headers: { "Content-Type": "text/plain" }
            }).then(() => refreshUserData());
        }
    </script>
</body>
</html>
